services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-maximos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel_maximos
      POSTGRES_PASSWORD: hotel_maximos
      POSTGRES_DB: hotel_maximos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_maximos -d hotel_maximos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
