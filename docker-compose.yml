services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-maximos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_maximos
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_password
    ports:
      - "5432:5432"
    volumes:
      - hotel_maximos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_maximos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hotel_maximos_postgres:
